services:
  api:
    build: .
    env_file:
      - .env
    ports:
      - "${QSIGN_API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./data:/app/data:ro
      - qsign_models:/models
      - qsign_assets:/assets
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-qsign}
      POSTGRES_USER: ${POSTGRES_USER:-qsign}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-local}
    ports:
      - "54329:5432"
    volumes:
      - qsign_pgdata:/var/lib/postgresql/data
      - ./infra/db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qsign} -d ${POSTGRES_DB:-qsign}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-qsign-local}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-change-me-local-minio}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - qsign_minio:/data
    restart: unless-stopped

volumes:
  qsign_pgdata:
  qsign_minio:
  qsign_models:
  qsign_assets:
